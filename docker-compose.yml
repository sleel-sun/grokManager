services:
  grokmanager:
    container_name: grokmanager
    build:
      context: .
      dockerfile: Dockerfile
    image: ${GROKMANAGER_IMAGE:-grokmanager:local}
    ports:
      - "${HOST_PORT:-8000}:${SERVER_PORT:-8000}"
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FILE_ENABLED: ${LOG_FILE_ENABLED:-true}
      ACCOUNT_SYNC_INTERVAL: ${ACCOUNT_SYNC_INTERVAL:-30}
      SERVER_HOST: ${SERVER_HOST:-0.0.0.0}
      SERVER_PORT: ${SERVER_PORT:-8000}
      SERVER_WORKERS: ${SERVER_WORKERS:-1}
      ACCOUNT_STORAGE: ${ACCOUNT_STORAGE:-local}
      ACCOUNT_LOCAL_PATH: /app/data/accounts.db
      ACCOUNT_REDIS_URL: ${ACCOUNT_REDIS_URL:-}
      ACCOUNT_MYSQL_URL: ${ACCOUNT_MYSQL_URL:-}
      ACCOUNT_POSTGRESQL_URL: ${ACCOUNT_POSTGRESQL_URL:-}
      DATA_DIR: /app/data
      LOG_DIR: /app/logs
      GROK_APP_APP_KEY: ${GROK_APP_APP_KEY:-}
      GROK_APP_API_KEY: ${GROK_APP_API_KEY:-}
      GROK_APP_APP_URL: ${GROK_APP_APP_URL:-}
      GROK_APP_WEBUI_ENABLED: ${GROK_APP_WEBUI_ENABLED:-}
      GROK_APP_WEBUI_KEY: ${GROK_APP_WEBUI_KEY:-}
      # 启用 CF 自动刷新: 取消以下三行注释，并取消底部 flaresolverr 服务的注释
      # FLARESOLVERR_URL: http://flaresolverr:8191
      # CF_REFRESH_INTERVAL: "600"
      # CF_TIMEOUT: "60"

      # ACCOUNT_STORAGE: local | redis | mysql | postgresql
      # ACCOUNT_LOCAL_PATH: SQLite path when ACCOUNT_STORAGE=local
      # ACCOUNT_REDIS_URL: Redis DSN when ACCOUNT_STORAGE=redis
      # ACCOUNT_MYSQL_URL: MySQL DSN when ACCOUNT_STORAGE=mysql
      # ACCOUNT_POSTGRESQL_URL: PostgreSQL DSN when ACCOUNT_STORAGE=postgresql
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped

  # 如果出口 IP 不干净，可取消以下注释使用 Warp 作为落地代理
  # 启用后将运行时配置里的 proxy.egress.proxy_url 设为 socks5://warp:1080
  # warp:
  #   container_name: warp
  #   image: caomingjun/warp:latest
  #   restart: unless-stopped
  #   ports:
  #     - "127.0.0.1:1080:1080"
  #   environment:
  #     - WARP_SLEEP=2
  #   cap_add:
  #     - NET_ADMIN

  # 启用 CF 自动刷新时取消以下注释
  # flaresolverr:
  #   container_name: flaresolverr
  #   image: ghcr.io/flaresolverr/flaresolverr:latest
  #   ports:
  #     - "127.0.0.1:8191:8191"
  #   environment:
  #     TZ: Asia/Shanghai
  #     LOG_LEVEL: info
  #   restart: unless-stopped
